Most people use Claude Code for one-shot tasks. Write this email. Fix this bug. Explain this code. That's useful — but it's like hiring a brilliant contractor and only giving them 15-minute jobs.

This repo is the architecture for something different: a **persistent operational layer** that remembers your context, runs in the background, and compounds over time. Morning briefings generated before you wake up. Meeting transcripts processed into facts and follow-ups overnight. Commitments tracked and surfaced when they're overdue.

It's the difference between "I use AI sometimes" and "AI is part of how I operate."

## Architecture Overview

\`\`\`
DATA SOURCES
  Calendar · Email · Meeting Transcripts · Analytics · Notes
                          ↓

  launchd/cron jobs · Session hooks · Reminder scripts
                          ↓

## The Three Work Tiers

The key design decision: not everything needs human involvement at every step.

**Tier 1 — Claude owns entirely:** Process transcripts, sync data, generate briefings, flag overdue items.

**Tier 2 — Claude preps, you decide:** Draft replies for you to review. Triage inbox for you to prioritize. Surface follow-ups for you to act on.

**Tier 3 — Human only:** Send messages, publish content, make judgment calls, strategic decisions.

Most AI setups try to do everything or nothing. This one is explicit about the handoff points.

## What's In Here

| File | What It Is |
|------|-----------|
| architecture.md | Full system diagram, data flows, memory system, scheduling |
| getting-started.md | Progressive build guide — Day 1 to Month 3+ |
| examples/CLAUDE.md | Template for your own chief of staff config |
| examples/scripts/briefing.py | Morning briefing generator |
| examples/scripts/meeting_processor.py | Transcript → facts + follow-ups pipeline |

## Design Principles

- **Clarity beats code.** The bottleneck is never technical — it's knowing what you want.
- **Progressive complexity.** Each layer works on its own before you add the next one.
- **Close loops, don't open them.** Every automation should end with a verifiable outcome.
- **Human-in-the-loop by design.** Prep is automated. Decisions are not.
- **Memory is architecture.** If the AI doesn't remember yesterday, it can't help with tomorrow.

---

## Memory System

The folder structure is just storage. The real power comes from how the system *searches*, *remembers*, and *builds on itself* across sessions.

### The Problem: Claude Code Has No Memory

Each Claude Code session starts fresh. Close the terminal, and everything from the conversation is gone. For a chief of staff that needs to remember your last 50 meetings, track 30 open commitments, and know that "Sarah" means your cofounder — it's a dealbreaker.

The memory system solves this with three layers:

\`\`\`
Layer 1: Structured Database (SQLite + FTS5)
  → Fast lookup of facts, follow-ups, meeting notes
  → Full-text search across everything extracted

Layer 2: Semantic Search (embedding-based)
  → "What did we discuss about pricing strategy?"
  → Finds relevant context even without exact keywords

Layer 3: Session Continuity
  → Snapshots of working state during sessions
  → Export transcripts on session end
  → Prep agent synthesizes overnight for next morning
\`\`\`

### Layer 1: Structured Memory (SQLite)

A single SQLite database stores everything the system extracts:

\`\`\`sql
-- Facts: atomic pieces of knowledge with provenance
CREATE TABLE facts (
    id INTEGER PRIMARY KEY,
    content TEXT NOT NULL,
    source TEXT,
    context TEXT,
    domain TEXT,
    confidence REAL DEFAULT 1.0,
    created_at TIMESTAMP,
    expires_at TIMESTAMP
);

-- Full-text search index
CREATE VIRTUAL TABLE facts_fts USING fts5(content, source, context);

-- Follow-ups: commitments with escalation tracking
CREATE TABLE follow_ups (
    id INTEGER PRIMARY KEY,
    owner TEXT NOT NULL,
    action TEXT NOT NULL,
    deadline TEXT,
    source_meeting TEXT,
    status TEXT DEFAULT 'open',
    escalation_level INTEGER DEFAULT 0,
    created_at TIMESTAMP,
    completed_at TIMESTAMP
);
\`\`\`

**Why SQLite?** Single file, no server, works everywhere. Claude Code can query it directly with sqlite3.

**Why FTS5?** Full-text search with ranking. The briefing script searches across all facts, meetings, and follow-ups instantly.

### Layer 2: Hybrid Search

Full-text search finds exact matches. But you also need *conceptual* matches — things that are related but use different words.

The hybrid approach combines:
1. **BM25 keyword search** (via FTS5) — fast, precise, great for names and specific terms
2. **Semantic vector search** — finds conceptual matches ("fundraising strategy" finds notes about "Series A timeline")

\`\`\`
Query: "What's the status of the product launch?"

BM25 results:
  → "Product launch date moved to March 15"
  → "Launch checklist reviewed in Monday standup"

Semantic results:
  → "Marketing assets need final approval before go-live"
  → "Beta feedback summary — 3 blockers remaining"

Combined + deduplicated → Full picture
\`\`\`

**Keyword search alone misses too much. Semantic search alone is too noisy. Use both.**

### Layer 3: Session Continuity

This is what makes the system feel like it *remembers you*, not just your data.

**Session snapshots:** Periodically during long sessions, the system captures a working summary — what you're focused on, decisions made, open threads. If the session hits context limits, snapshots provide continuity.

**Session export:** When a session ends, the full transcript is saved. This creates a searchable archive of every conversation.

**Working memory:** A small set of files representing your *current state* — what you're focused on this week, decisions pending, active threads. Updated by the system, read at session start.

\`\`\`
working/
├── this-week.md          # Current focus areas
├── pending-decisions.md  # Decisions waiting on you
├── active-threads.md     # Conversations in progress
└── energy-context.md     # Schedule density, capacity notes
\`\`\`

### The Overnight Pipeline

The most powerful part runs while you sleep:

\`\`\`
Late evening  → Sweep: reconcile all data sources
Overnight     → Task check: scan for overdue items,
                 approaching deadlines, stale follow-ups
Pre-dawn      → Prep agent: synthesize into a
                 draft briefing with priorities
By morning    → Briefing ready when you
                 open your first session
\`\`\`

Each step builds on the previous one. The sweep ensures data is current. The task check flags what needs attention. The prep agent decides what's *worth your attention* — not everything new, just what matters.

### Follow-Up Escalation

Not all follow-ups are equal. A commitment made yesterday is different from one that's 2 weeks overdue:

| Level | Age | Signal | Action |
|-------|-----|--------|--------|
| 0 | 0-3 days | Normal | Included in briefing if relevant |
| 1 | 4-7 days | Getting stale | Flagged with gentle nudge |
| 2 | 8-14 days | Overdue | Highlighted, suggested follow-up draft |
| 3 | 14+ days | At risk | Top of briefing, draft message ready |

Items naturally rise in visibility as they age — no manual triage needed.

### Daily Retrospective

Once a day, the system reviews what happened:

1. **Session review** — What was discussed? Accomplished? Deferred?
2. **Commitment tracking** — New follow-ups? Completed? Escalating?
3. **Pattern detection** — Same topic coming up repeatedly? Something being avoided?

The retrospective feeds back into the next morning's briefing: **work → capture → review → prioritize → work**.

## Scheduling

### macOS (launchd)

Each job is a small .plist file in ~/Library/LaunchAgents/.

\`\`\`xml
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
  "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>Label</key>
    <string>com.chiefofstaff.meeting-sync</string>
    <key>ProgramArguments</key>
    <array>
        <string>/usr/bin/python3</string>
        <string>/Users/you/Scripts/meeting_sync.py</string>
    </array>
    <key>StartInterval</key>

</dict>
</plist>
\`\`\`

\`\`\`

Claude Code supports hooks that run automatically at session start and end:

    "SessionEnd": [

}

## CLAUDE.md as Operating System

The CLAUDE.md file is the most important piece of the architecture. It's not just context — it's the **operating instructions** for your AI chief of staff.

Key sections:
1. **Who you are** — role, company, key relationships
2. **How you work** — communication style, decision-making patterns, energy rhythms
3. **Chief of staff duties** — what Claude should proactively do
4. **Tone and personality** — how Claude should interact with you
5. **Priority framework** — how to weight competing tasks
6. **Tools and connectors** — what integrations are available

The CLAUDE.md should be a living document. Update it when Claude gets something wrong. Add rules when you notice repeated mistakes. Remove rules that no longer apply.

**Watch the length.** CLAUDE.md is loaded into every session's context window. A 200-line file that's tight and specific beats a 2,000-line file bloated with edge cases. If it's getting long, split reference material into separate memory files and keep the core instructions concise.`,

## Phase 1: The Foundation (Day 1 — 10 minutes)

### Create your CLAUDE.md

This is the single highest-leverage thing you can do with Claude Code. Create a file called \`CLAUDE.md\` in your project folder:

\`\`\`markdown
# About Me
[Your name] — [what you do in one sentence]

# Key Context
- My main focus right now is...
- I communicate via [channels]
- My voice is [casual/professional/direct/warm]

# How I Work
- Strongest at: [your superpower]
- Weakest at: [your gap]
- When drafting messages, match my voice: [2-3 style notes]
\`\`\`

Even 5 lines dramatically improves every Claude interaction going forward.

**Keep it tight.** CLAUDE.md loads into every session's context window — every line costs tokens. A focused 100-200 line file beats a sprawling 2,000 line one. If it's getting long, move reference material into separate memory files and keep the core instructions lean.

**What you'll notice:** Claude stops feeling generic. It starts using your terminology, matching your tone, remembering your priorities.

---

## Phase 2: Memory (Week 1 — 30 minutes)

### Add persistent memory files

Claude Code has an auto-memory directory at \`~/.claude/projects/[your-project]/memory/\`. Files here persist across sessions.

\`\`\`markdown
# Memory

## Active Projects
- [Project A]: [status, key contacts, next steps]

## Open Follow-ups
- [ ] Reply to Sarah about the proposal (due Friday)
- [ ] Send deck to investor group

## Decisions Made
- 2024-01-15: Decided to focus on B2B over B2C for Q1
\`\`\`

**Key principle:** Memory files should be updated by Claude during sessions, not just by you.

**What you'll notice:** Sessions stop with "where were we?" Claude opens with "Last time we decided X, and you still need to follow up on Y."

---

## Phase 3: The Morning Briefing (Week 2 — 1 hour)

Start manual, then automate. Do it by hand for a few days so you know what you actually want. Then ask Claude to build the script.

**What you'll notice:** You stop starting the day in reactive mode. The briefing tells you what matters before your inbox does.

---

## Phase 4: Meeting Processing (Month 1 — 2 hours)

If you use a meeting transcription tool, build a pipeline that extracts facts, commitments, and follow-ups automatically.

**What you'll notice:** Three weeks in, Claude casually mentions context from a call you barely remember. That's the compound effect.

---

## Phase 5: Background Automation (Month 2)

Take your working scripts and schedule them with launchd or cron. Things start happening without you asking.

---

## Phase 6: Session Hooks (Month 2)

Add hooks so Claude automatically gets context at session start and saves context at session end.

---

## Phase 7: The Full Stack (Month 3+)

Everything connects. CLAUDE.md + memory + briefings + processing + scheduling + hooks. Each addition compounds on the foundation.

## Common Mistakes

1. **Building it all at once.** Each layer should be proven before the next one is added.
2. **Neglecting CLAUDE.md.** It's the foundation. If Claude keeps getting things wrong, update CLAUDE.md.
3. **Automating before you understand.** Do things manually first. You need to know what "good" looks like.
4. **Treating memory as a dump.** Curate it. Outdated context is worse than no context.
5. **Skipping the follow-up tracker.** Most of the value comes from "you said you'd do X and it's been 5 days."`,
